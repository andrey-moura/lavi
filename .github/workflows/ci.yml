name: Lavi CI

on:
  push:
    branches:
      - master
      - '1.*.x'

  pull_request:
    branches:
      - master
      - '1.*.x'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version_changed:
    runs-on: ubuntu-22.04

    outputs:
      changed: ${{ steps.changed.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check VERSION changes
        id: changed
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^VERSION$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - windows-2022

    runs-on: ${{ matrix.os }}

    permissions:
      id-token: write
      contents: read
      checks: write

    steps:
      - name: Checkout lavi
        uses: actions/checkout@v4
        with:
          path: lavi
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get install -y build-essential ccache

      - name: Install dependencies (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          choco install sccache -y

      - name: Restore ccache
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/ccache
          key: ccache-${{ matrix.os }}

      - name: Restore sccache
        if: startsWith(matrix.os, 'windows')
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\AppData\Local\Mozilla\sccache\cache
          key: sccache-${{ matrix.os }}

      - name: Display build folder (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          ls -la build || echo "No build folder"
        working-directory: lavi

      - name: Configure CMake (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -B build .
        working-directory: lavi

      - name: Configure CMake (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -B build .
        working-directory: lavi

      - name: Build project
        run: |
          cmake --build build --config Release --parallel
        working-directory: lavi

      - name: Show ccache stats (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          ccache -s

      - name: Show sccache stats (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          sccache --show-stats

      - name: Show ccache config (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          ccache --show-config

      - name: Install project (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo cmake --install build
        working-directory: lavi

      - name: Install project (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          cmake --install build --config Release
        working-directory: lavi

      - name: Check lavi version (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          lavi --version
        working-directory: lavi

      - name: Check lavi version (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          & "C:\Program Files (x86)\lavi\bin\lavi.exe" --version
      
      - name: Check minimal functionality (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          lavi hello
        working-directory: lavi

      - name: Check minimal functionality (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          & "C:\Program Files (x86)\lavi\bin\lavi.exe" hello

      - name: Run tests (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          lavi tests
        working-directory: lavi

      - name: Run tests (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          & "C:\Program Files (x86)\lavi\bin\lavi.exe" tests
        working-directory: lavi

      - name: Package artifacts (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          mkdir -p artifacts

          cp build/lavi artifacts/
          cp build/lavi-analyzer artifacts/

          cd artifacts

          tar -czf \
            lavi-${{ matrix.os }}.tar.gz \
            lavi \
            lavi-analyzer
        working-directory: lavi

      - name: Package artifacts (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force artifacts

          Copy-Item `
            "C:\Program Files (x86)\lavi\bin\lavi.exe" `
            artifacts\

          Copy-Item `
            "C:\Program Files (x86)\lavi\bin\lavi-analyzer.exe" `
            artifacts\

          Compress-Archive `
            -Path artifacts\* `
            -DestinationPath lavi-${{ matrix.os }}.zip
        working-directory: lavi

      - name: Upload artifacts (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: lavi-${{ matrix.os }}
          path: |
            lavi/artifacts/*.tar.gz

      - name: Upload artifacts (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: lavi-${{ matrix.os }}
          path: |
            lavi/artifacts/*.zip

  release:
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref_name, '1.') &&
      endsWith(github.ref_name, '.x') &&
      needs.version_changed.outputs.changed == 'true'

    needs:
      - build
      - version_changed

    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate branch/version compatibility
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BRANCH=${GITHUB_REF_NAME}

          PREFIX=$(echo "$BRANCH" | sed 's/\.x$//')

          if [[ "$VERSION" != ${PREFIX}.* ]]; then
            echo "VERSION does not match branch"
            echo "Branch: $BRANCH"
            echo "Version: $VERSION"
            exit 1
          fi

      - name: Fail if tag already exists
        run: |
          TAG=v${{ steps.version.outputs.version }}

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
            exit 1
          fi

      - name: Create tag
        run: |
          TAG=${{ steps.version.outputs.version }}

          git tag "$TAG"
          git push origin "$TAG"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: |
          find artifacts

      - name: Generate checksums
        run: |
          find artifacts -name '*.tar.gz' -exec sha256sum {} \; \
            > SHA256SUMS.txt

      - name: Generate release notes (feat/fix only)
        id: release_notes
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found"
            RANGE=""
          else
            RANGE="$PREVIOUS_TAG..HEAD"
          fi

          echo "## Release $TAG" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md

          echo "### Features" >> RELEASE_NOTES.md
          git log $RANGE --pretty=format:"- %s (%h)" --grep="^feat" >> RELEASE_NOTES.md || true

          echo "" >> RELEASE_NOTES.md
          echo "### Fixes" >> RELEASE_NOTES.md
          git log $RANGE --pretty=format:"- %s (%h)" --grep="^fix" >> RELEASE_NOTES.md || true

          echo "" >> RELEASE_NOTES.md
          echo "### Other changes" >> RELEASE_NOTES.md
          git log $RANGE --pretty=format:"- %s (%h)" \
            --invert-grep --grep="^feat" --grep="^fix" >> RELEASE_NOTES.md || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            SHA256SUMS.txt